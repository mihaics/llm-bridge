name: Release

# Tag a commit `vX.Y.Z` and push the tag to build a release binary and publish a GitHub Release:
#   git tag -a v0.1.0 -m "llm-bridge v0.1.0" && git push origin v0.1.0
on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write          # required for action-gh-release to create the Release

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package (tarball + checksum)
        run: |
          asset="llm-bridge-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "$asset" -C target/release llm-bridge
          sha256sum "$asset" > "$asset.sha256"
          ls -l "$asset" "$asset.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            llm-bridge-*-x86_64-unknown-linux-gnu.tar.gz
            llm-bridge-*-x86_64-unknown-linux-gnu.tar.gz.sha256
